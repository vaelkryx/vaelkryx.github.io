<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VAELKRYX | Official</title>
    <style>
        body { 
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.8)), 
                        url('bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff; 
            font-family: 'Courier New', monospace; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start;
            min-height: 100vh; 
            margin: 0; 
            padding: 80px 20px; 
            position: relative;
        }

        /* Top Left Logo */
        .logo { 
            position: absolute;
            top: 20px;
            left: 20px;
            width: 80px; 
            height: 80px; 
            object-fit: cover; 
            border-radius: 50%; 
            border: 1px solid #333;
            display: block; 
        }

        h1 { 
            font-size: 3.5em; /* Increased by 1.5x */
            letter-spacing: 15px; 
            text-transform: uppercase; 
            border-bottom: 2px solid #333; 
            padding-bottom: 15px; 
            margin: 0 0 10px 0; 
            text-align: center;
        }
        
        .subtitle { 
            color: #888; 
            margin-bottom: 50px; 
            font-size: 1.3em; /* Slightly larger as requested */
            text-align: center; 
            letter-spacing: 2px;
        }

        .links { margin-bottom: 50px; text-align: center; }
        .links a { 
            color: #666; 
            text-decoration: none; 
            margin: 0 15px; 
            font-size: 0.9em; 
            transition: 0.3s; 
            text-transform: uppercase; 
        }
        .links a:hover { color: #ff0000; border-bottom: 1px solid #ff0000; }

        .player-container { width: 100%; max-width: 500px; }
        .player { margin-bottom: 20px; border: 1px solid #222; background: rgba(17, 17, 17, 0.8); }
    </style>
</head>
<body>

    <img src="logo.png" alt="Logo" class="logo">

    <h1>VAELKRYX</h1>
    <p class="subtitle">Alternative Hip-Hop / Dark Sound</p>
    
    <div class="links">
        <a href="https://soundcloud.com/tsbduh6jqogl/tracks" target="_blank">Soundcloud</a>
        <a href="https://www.youtube.com/@bihus_oficial" target="_blank">YouTube</a>
        <a href="https://www.tiktok.com/@bihusvitalii" target="_blank">TikTok</a>
    </div>

    <div class="player-container">
        <div class="player">
            <iframe width="100%" height="150" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/2317190522&color=%23ff5500&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true&visual=true"></iframe>
        </div>
    </div>

</body>
</html>
